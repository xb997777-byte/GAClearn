<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>英语单词微信小程序 - 学习统计</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css">
  <link rel="stylesheet" href="./assets/prototype.css">
</head>
<body class="prototype-page">
  <div class="phone-shell">
    <div class="phone-screen">
      <div class="page-backdrop page-backdrop--aurora"></div>
      <div class="dynamic-island"></div>
      <div class="status-bar">
        <div>9:41</div>
        <div class="status-meta">
          <i class="ri-signal-wifi-3-line"></i>
          <i class="ri-wifi-line"></i>
          <i class="ri-battery-charge-line"></i>
        </div>
      </div>

      <main class="screen-scroll">
        <section class="section">
          <div class="row row--between row--center">
            <div>
              <p class="eyebrow">学习统计</p>
              <h1 class="title-lg">你的节奏已经开始稳定下来了</h1>
            </div>
            <a class="pill" href="#" data-toast="时间筛选为原型示意">最近 30 天</a>
          </div>
        </section>

        <section class="section">
          <div class="metric-grid">
            <div class="metric-card">
              <p class="metric-label">累计学习</p>
              <p class="metric-value">240</p>
              <p class="metric-helper">较上周 +32</p>
            </div>
            <div class="metric-card">
              <p class="metric-label">连续打卡</p>
              <p class="metric-value">9 天</p>
              <p class="metric-helper">本月最长 12 天</p>
            </div>
            <div class="metric-card">
              <p class="metric-label">复习完成率</p>
              <p class="metric-value">82%</p>
              <p class="metric-helper">高于目标 6%</p>
            </div>
            <div class="metric-card">
              <p class="metric-label">测试均分</p>
              <p class="metric-value">86</p>
              <p class="metric-helper">最近 5 轮结果</p>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="card">
            <div class="row row--between row--center">
              <div>
                <p class="eyebrow">7 日趋势</p>
                <h2 class="title-md">学习热度逐步回升</h2>
              </div>
              <a class="badge badge--soft" href="#" data-toast="图表切换为原型示意"><i class="ri-line-chart-line"></i></a>
            </div>
            <div class="chart">
              <div class="chart__group"><div class="chart__bar" style="height: 38%;"></div><span class="chart__label">周一</span></div>
              <div class="chart__group"><div class="chart__bar" style="height: 66%;"></div><span class="chart__label">周二</span></div>
              <div class="chart__group"><div class="chart__bar" style="height: 52%;"></div><span class="chart__label">周三</span></div>
              <div class="chart__group"><div class="chart__bar" style="height: 76%;"></div><span class="chart__label">周四</span></div>
              <div class="chart__group"><div class="chart__bar" style="height: 82%;"></div><span class="chart__label">周五</span></div>
              <div class="chart__group"><div class="chart__bar" style="height: 48%;"></div><span class="chart__label">周六</span></div>
              <div class="chart__group"><div class="chart__bar" style="height: 72%;"></div><span class="chart__label">周日</span></div>
            </div>
          </div>
        </section>

        <section class="section stack">
          <div class="card card--soft">
            <p class="eyebrow">掌握分布</p>
            <div class="row row--center" style="margin-top: 12px;">
              <div class="donut" style="--ratio: 72%;">
                <div class="donut__content">
                  <p class="donut__value">72%</p>
                  <p class="donut__label">稳定掌握</p>
                </div>
              </div>
            </div>
            <div class="stack" style="margin-top: 12px;">
              <div class="inline-progress">
                <span class="subtitle">掌握良好</span>
                <div class="bar bar--green"><span style="width: 72%;"></span></div>
              </div>
              <div class="inline-progress">
                <span class="subtitle">待巩固</span>
                <div class="bar"><span style="width: 18%;"></span></div>
              </div>
              <div class="inline-progress">
                <span class="subtitle">高风险</span>
                <div class="bar bar--warm"><span style="width: 10%;"></span></div>
              </div>
            </div>
          </div>

          <div class="card">
            <p class="eyebrow">本月打卡</p>
            <h2 class="title-md">你的连续性正在变强</h2>
            <div class="calendar" style="margin-top: 14px;">
              <div class="calendar__day is-done">1</div>
              <div class="calendar__day is-done">2</div>
              <div class="calendar__day is-done">3</div>
              <div class="calendar__day is-done">4</div>
              <div class="calendar__day is-done">5</div>
              <div class="calendar__day is-done">6</div>
              <div class="calendar__day is-done">7</div>
              <div class="calendar__day is-done">8</div>
              <div class="calendar__day is-done">9</div>
              <div class="calendar__day">10</div>
              <div class="calendar__day">11</div>
              <div class="calendar__day">12</div>
              <div class="calendar__day">13</div>
              <div class="calendar__day">14</div>
            </div>
          </div>

          <div class="card">
            <p class="eyebrow">成就徽章</p>
            <div class="achievement-grid" style="margin-top: 14px;">
              <div class="achievement">
                <i class="ri-fire-line"></i>
                <p>连续 7 天</p>
              </div>
              <div class="achievement">
                <i class="ri-flashlight-line"></i>
                <p>单日 30 词</p>
              </div>
              <div class="achievement">
                <i class="ri-trophy-line"></i>
                <p>测试 90+</p>
              </div>
            </div>
          </div>
        </section>
      </main>

      <nav class="bottom-nav">
        <a class="nav-item" href="./home.html">
          <i class="ri-home-5-line"></i>
          <span>首页</span>
        </a>
        <a class="nav-item" href="./books.html">
          <i class="ri-book-2-line"></i>
          <span>词书</span>
        </a>
        <a class="nav-item is-active" href="./stats.html">
          <i class="ri-bar-chart-box-line"></i>
          <span>统计</span>
        </a>
        <a class="nav-item" href="./profile.html">
          <i class="ri-user-3-line"></i>
          <span>我的</span>
        </a>
      </nav>

      <div class="toast">模拟交互已响应</div>
    </div>
  </div>
  <script src="./assets/prototype.js"></script>
</body>
</html>
