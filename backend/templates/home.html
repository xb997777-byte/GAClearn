<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg: #0b1320;
      --card: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef4ff;
      --muted: #b2bfd6;
      --primary: #4f7cff;
      --primary-2: #17c7a3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79, 124, 255, 0.28), transparent 28%),
        radial-gradient(circle at top right, rgba(23, 199, 163, 0.18), transparent 22%),
        linear-gradient(180deg, #07111d, #0c1626 45%, #0b1320);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 920px;
      padding: 36px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 42px;
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 28px;
    }

    .card {
      padding: 20px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--line);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 14px 18px;
      border-radius: 16px;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #3155e7);
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--primary-2), #0e8f77);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--line);
    }

    code {
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>英语单词学习系统</h1>
    <p>当前 Django 服务已经正常运行。你现在访问根路径 <code>/</code> 会看到这个首页，不会再出现 404。</p>

    <section class="grid">
      <article class="card">
        <h2>后台管理</h2>
        <p>进入 Django Admin + SimpleUI 后台，使用管理员账号登录并管理词书、单词、测试和统计数据。</p>
      </article>
      <article class="card">
        <h2>API 接口</h2>
        <p>进入接口根路径查看当前 API 模块信息，也可以直接调用健康检查接口验证服务状态。</p>
      </article>
      <article class="card">
        <h2>管理员账号</h2>
        <p>用户名：<code>admin</code><br>密码：<code>199977</code></p>
      </article>
    </section>

    <div class="btns">
      <a class="btn btn-primary" href="{{ admin_url }}">进入后台管理</a>
      <a class="btn btn-secondary" href="{{ api_url }}">查看 API 根接口</a>
      <a class="btn btn-ghost" href="{{ health_url }}">查看健康检查</a>
    </div>
  </main>
</body>
</html>
